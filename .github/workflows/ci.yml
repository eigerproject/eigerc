name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: sudo apt-get install cmake g++

    - name: Build
      run: |
        cmake -S . -B build
        cmake --build build

    - name: Run tests
      run: cd build && ./eigertest
